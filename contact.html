<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - TMF Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar (same as above) -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">T</div>
                <h1 class="text-2xl font-semibold text-gray-900">TMF Sandbox</h1>
            </div>
            <div class="flex items-center space-x-8">
                <a href="index.html" class="font-medium hover:text-blue-600">Home</a>
                <a href="intake.html" class="font-medium hover:text-blue-600">Intake Form</a>
                <a href="contact.html" class="font-medium text-blue-600">Contact</a>
                <span class="px-4 py-1 text-xs font-semibold bg-amber-100 text-amber-700 rounded-full border border-amber-300">SANDBOX ONLY</span>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-6 py-16">
        <div class="bg-white rounded-3xl shadow-xl p-10">
            <h2 class="text-4xl font-bold text-center mb-2">Contact Sandbox Administrator</h2>
            <p class="text-gray-500 text-center mb-10">This is a simulation page</p>

            <form name="contact-form" method="POST" data-netlify="true" class="space-y-8">
                <input type="hidden" name="form-name" value="contact-form">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Your Name</label>
                    <input type="text" name="name" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                    <input type="text" name="subject" required 
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Message</label>
                    <textarea name="message" rows="6" required
                              class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500"></textarea>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-5 rounded-2xl transition-all text-lg shadow-lg">
                    Send Message
                </button>
            </form>
        </div>
    </div>

    <footer class="bg-gray-900 text-gray-400 py-8 text-center text-sm">
        TMF Sandbox • Training Environment Only
    </footer>

</body>
</html>
